# This file defines ALL the services needed to run the full pipeline:
#
#   - minio            : S3-compatible object storage (BRONZE/SILVER/gold buckets)
#   - minio-init       : one-off helper that creates the buckets on startup
#   - postgres         : database used internally by Airflow to store metadata
#   - airflow-init     : one-off helper that initializes the Airflow database
#   - airflow-webserver: Airflow UI (http://localhost:8080)
#   - airflow-scheduler: runs the DAG / triggers tasks
#   - streamlit        : the dashboard (http://localhost:8501)
#
# HOW TO RUN EVERYTHING:
#   1. Place your 8 Excel files into ./data/input/
#   2. From the project root, run:
#        docker compose up -d --build
#   3. Open http://localhost:8080 (Airflow UI, login admin/admin)
#      -> enable + trigger the 'energy_pipeline_dag'
#   4. Open http://localhost:9001 (MinIO console, login from .env)
#      -> inspect the BRONZE/SILVER/gold buckets
#   5. Open http://localhost:8501 (Streamlit dashboard)

version: "3.8"

services:

  # MinIO: S3-compatible object storage (our "data lake")
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # S3 API port
      - "9001:9001"   # Web console port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Postgres: metadata database required by Airflow
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5

  # Airflow Webserver: the UI at http://localhost:8080
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "a_simple_secret_key_for_academic_project"
      # --- These get passed through to our scripts/DAG ---
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BUCKET_BRONZE: ${BUCKET_BRONZE}
      BUCKET_SILVER: ${BUCKET_SILVER}
      BUCKET_GOLD: ${BUCKET_GOLD}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    ports:
      - "8080:8080"
    command: webserver

  # Airflow Scheduler: runs the DAG and executes tasks
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BUCKET_BRONZE: ${BUCKET_BRONZE}
      BUCKET_SILVER: ${BUCKET_SILVER}
      BUCKET_GOLD: ${BUCKET_GOLD}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    command: scheduler

  # Streamlit Dashboard: http://localhost:8501
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: streamlit
    depends_on:
      - minio
    environment:
      PYTHONPATH: /app
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BUCKET_GOLD: ${BUCKET_GOLD}
    ports:
      - "8501:8501"

# Named volumes: persist data between container restarts
volumes:
  minio_data: 
  postgres_data: 
